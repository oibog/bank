<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO SON LAM - Profile Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            background-color: #000;
            color: white;
        }

        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.4) blur(3px);
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Tùy chỉnh nút của SweetAlert */
        .swal2-styled.swal2-confirm {
            background-color: #2563eb !important;
            border-radius: 1rem !important;
            padding: 10px 30px !important;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <video loop playsinline id="video-bg">
        <source src="https://raw.githubusercontent.com/monsterx173/nhac/main/田夢迪.mp4" type="video/mp4">
    </video>

    <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 text-center relative overflow-hidden animate-fade-in">
        
        <div class="mb-8">
            <div class="relative w-24 h-24 mx-auto mb-4">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-xl opacity-30 animate-pulse"></div>
                <div class="relative w-full h-full bg-gradient-to-br from-blue-600 to-blue-400 rounded-full flex items-center justify-center text-3xl font-bold shadow-2xl border border-white/20">
                    L
                </div>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">NGO SON LAM</h1>
            <div class="flex items-center justify-center gap-2 mt-2 text-blue-400 font-mono text-sm bg-blue-500/10 py-1 px-4 rounded-full w-fit mx-auto">
                <i class="fas fa-university"></i>
                <span>0374583885</span>
            </div>
        </div>

        <div class="space-y-4 text-left">
            <div class="group">
                <label class="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em] ml-2">Số tiền thanh toán</label>
                <input type="number" id="amount" placeholder="Nhập số tiền VNĐ..." 
                    class="w-full mt-1.5 bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>
            <div class="group">
                <label class="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em] ml-2">Lời nhắn</label>
                <input type="text" id="message" placeholder="Nội dung chuyển khoản..." 
                    class="w-full mt-1.5 bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
            </div>
            <button onclick="generateQR()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 transform mt-4 uppercase tracking-widest text-sm">
                Xác nhận tạo mã QR
            </button>
        </div>

        <div id="qr-area" class="mt-8 hidden overflow-hidden transition-all duration-700">
            <div class="bg-white p-5 rounded-[2rem] inline-block shadow-2xl transform transition-transform hover:scale-105">
                <div class="flex justify-between items-center mb-3 px-2">
                    <span class="text-[10px] font-black text-red-600 italic">VietQR</span>
                    <span class="text-[10px] font-black text-blue-900 italic font-sans">MB BANK</span>
                </div>
                <img id="qr-code" src="" alt="Mã QR" class="w-52 h-52">
                <div class="mt-3 flex justify-between px-2 text-[8px] text-gray-400 font-bold uppercase tracking-tighter">
                    <span>Napas247</span>
                    <span>Secure Payment</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-bg');

        // Hiện thông báo khi vừa vào web
        window.onload = function() {
            Swal.fire({
                title: 'Welcome!',
                text: 'Bank đi nào!',
                icon: 'info',
                confirmButtonText: 'OK',
                background: '#1a1a1a',
                color: '#ffffff',
                allowOutsideClick: false,
                backdrop: `rgba(0,0,0,0.9)`
            }).then((result) => {
                if (result.isConfirmed) {
                    // Kích hoạt video và nhạc
                    video.play();
                    video.muted = false; // Bật tiếng nhạc
                }
            });
        };

        function generateQR() {
            const amount = document.getElementById('amount').value;
            const message = document.getElementById('message').value || "Chuyen tien cho NGO SON LAM";
            const qrArea = document.getElementById('qr-area');
            const qrImg = document.getElementById('qr-code');

            if (!amount || amount <= 0) {
                Swal.fire({
                    title: 'Lỗi!',
                    text: 'Vui lòng nhập số tiền hợp lệ',
                    icon: 'error',
                    confirmButtonText: 'Đã hiểu',
                    background: '#1a1a1a',
                    color: '#fff'
                });
                return;
            }

            // API tạo QR động cho MB Bank
            const qrUrl = `https://img.vietqr.io/image/MB-0374583885-compact2.png?amount=${amount}&addInfo=${encodeURIComponent(message)}&accountName=NGO%20SON%20LAM`;
            
            qrImg.src = qrUrl;
            qrArea.classList.remove('hidden');
            
            // Cuộn xuống xem QR
            setTimeout(() => {
                qrArea.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }
    </script>
</body>
</html>
