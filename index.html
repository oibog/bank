<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB BANK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap');
        
        body { font-family: 'Lexend', sans-serif; margin: 0; background-color: #000; color: white; overflow: hidden; }

        /* Video Nền Miku mới */
        #video-bg {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.6) contrast(1.1);
        }

        /* Thẻ Tab siêu mờ nhìn xuyên thấu video */
        .glass-card {
            background: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            transition: all 0.5s ease;
        }

        /* Khung QR thoáng đãng */
        .qr-frame {
            background: #ffffff;
            padding: 2rem;
            border-radius: 2.5rem;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
        }

        /* Hiệu ứng tích xanh thành công */
        .success-checkmark { width: 80px; height: 115px; margin: 0 auto; }
        .check-icon {
            width: 80px; height: 80px; position: relative; border-radius: 50%;
            box-sizing: content-box; border: 4px solid #4CAF50;
        }
        .check-icon::after {
            content: ''; position: absolute; top: 23px; left: 15px; width: 45px; height: 22px;
            border-left: 4px solid #4CAF50; border-bottom: 4px solid #4CAF50;
            transform: rotate(-45deg); opacity: 0; animation: checkmark 0.8s ease-in-out forwards;
        }
        @keyframes checkmark {
            0% { height: 0; width: 0; opacity: 1; }
            20% { height: 0; width: 45px; opacity: 1; }
            40% { height: 22px; width: 45px; opacity: 1; }
            100% { height: 22px; width: 45px; opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <video loop playsinline id="video-bg">
        <source src="https://raw.githubusercontent.com/oibog/bank/main/MIKU%20MUSIC🎶.mp4" type="video/mp4">
    </video>

    <div class="glass-card w-full max-w-lg p-10 text-center">
        
        <div class="mb-8">
            <div class="w-32 h-32 mx-auto rounded-full p-1 bg-gradient-to-tr from-cyan-400 to-blue-600 shadow-2xl overflow-hidden mb-5 border-2 border-white/20">
                <img src="https://sf-static.upanhlaylink.com/img/image_20260301f12355a955a437aa0ab2a22ded040963.jpg" 
                     alt="NGO SON LAM" class="w-full h-full rounded-full object-cover">
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tighter">NGO SON LAM</h1>
            <div class="inline-block mt-3 px-6 py-1 bg-cyan-500/10 rounded-full border border-cyan-500/20">
                <p class="text-cyan-300 text-sm font-mono tracking-widest uppercase">MB BANK: 0374583885</p>
            </div>
        </div>

        <div class="space-y-5 text-left mb-6">
            <div>
                <label class="text-[10px] text-gray-400 uppercase font-bold tracking-[0.2em] ml-2 italic">Số tiền (Max 5.000đ)</label>
                <input type="number" id="amount" placeholder="VD: 5000" 
                    class="w-full mt-2 bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all text-lg font-bold">
            </div>
            <div>
                <label class="text-[10px] text-gray-400 uppercase font-bold tracking-[0.2em] ml-2 italic">Lời nhắn</label>
                <input type="text" id="message" placeholder="Nội dung..." 
                    class="w-full mt-2 bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-400 transition-all">
            </div>
            <button onclick="generateQR()" 
                class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest mt-2 border border-white/10">
                Tạo mã QR Ngay
            </button>
        </div>

        <div id="qr-area" class="hidden mt-4 animate-fade-in">
            <div class="qr-frame inline-block scale-100">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="text-xs font-black text-red-600 italic">VIETQR</span>
                    <span class="text-xs font-black text-blue-900">MB BANK</span>
                </div>
                <img id="qr-code" src="" alt="Mã QR" class="w-64 h-64 object-contain mx-auto">
                <div class="mt-4 border-t border-gray-100 pt-4 flex justify-between px-2 text-[9px] text-gray-400 font-bold uppercase tracking-widest">
                    <span>Napas 247</span>
                    <span>Verified Payment</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-bg');

        // Bật nhạc và video khi xác nhận
        window.onload = function() {
            Swal.fire({
                title: 'Welcome!',
                text: 'Bank đi nào!',
                iconHtml: '<img src="https://sf-static.upanhlaylink.com/img/image_20260301f12355a955a437aa0ab2a22ded040963.jpg" style="width:100%; border-radius:50%">',
                confirmButtonText: 'OK',
                background: '#111',
                color: '#fff',
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    video.play();
                    video.muted = false;
                }
            });
        };

        function generateQR() {
            const amount = document.getElementById('amount').value;
            const message = document.getElementById('message').value || "Chuyen khoan NGO SON LAM";
            const qrArea = document.getElementById('qr-area');
            const qrImg = document.getElementById('qr-code');

            // Kiểm tra tối đa 5000đ
            if (!amount || amount <= 0) {
                Swal.fire({ title: 'Lỗi!', text: 'Nhập số tiền hợp lệ', icon: 'error', background: '#111', color: '#fff' });
                return;
            }
            if (amount > 5000) {
                Swal.fire({ title: 'Cảnh báo!', text: 'Số tiền tối đa là 5.000 VNĐ', icon: 'warning', background: '#111', color: '#fff' });
                return;
            }

            const qrUrl = `https://img.vietqr.io/image/MB-0374583885-compact2.png?amount=${amount}&addInfo=${encodeURIComponent(message)}&accountName=NGO%20SON%20LAM`;
            qrImg.src = qrUrl;

            // Thông báo thành công + tích xanh
            Swal.fire({
                title: 'Thành công!',
                html: '<div class="success-checkmark"><div class="check-icon"></div></div>',
                showConfirmButton: false,
                timer: 1500,
                background: '#111',
                color: '#fff'
            });

            // Hiệu ứng pháo giấy màu xanh Miku
            confetti({ 
                particleCount: 150, 
                spread: 70, 
                origin: { y: 0.6 },
                colors: ['#00FFFF', '#0080FF', '#ffffff']
            });

            qrArea.classList.remove('hidden');
            setTimeout(() => { qrArea.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 300);
        }
    </script>
</body>
</html>
